<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мафия — Лобби</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0a0a1a,#1a1a2e,#0f1623);min-height:100vh;color:#e0e0e0}
.header{background:rgba(0,0,0,.5);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,215,0,.2)}
.logo{color:#ffd700;font-size:1.2rem;font-weight:bold;text-decoration:none}
.code-box{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);padding:8px 16px;border-radius:8px;display:flex;align-items:center;gap:10px}
.code-box span{color:#ffd700;font-family:monospace;font-size:1.2rem;letter-spacing:3px}

.main{max-width:700px;margin:0 auto;padding:24px 16px}
.players{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.slot{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:14px;text-align:center;position:relative}
.slot.ready{border-color:#4ecdc4}
.slot-name{font-size:.85rem;font-weight:bold;margin-top:6px}

.actions{display:flex;justify-content:center;gap:10px;margin-bottom:16px}
.btn{padding:12px 28px;font-size:.9rem;border:1px solid #ffd700;background:transparent;color:#ffd700;cursor:pointer;border-radius:6px}
.btn-prim{background:linear-gradient(45deg,#ffd700,#ff8c00);color:#0f0f1a;border:none;font-weight:bold}
.btn:disabled{opacity:.3;cursor:not-allowed}
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBTD1Y1Bx-dnpGW8vhPEooCQYfwwl1J7gc",
    authDomain: "mafiya-f67b8.firebaseapp.com",
    databaseURL: "https://mafiya-f67b8-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "mafiya-f67b8",
    storageBucket: "mafiya-f67b8.firebasestorage.app",
    messagingSenderId: "558213204051",
    appId: "1:558213204051:web:b54966b94d8be66c16dea6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const room = localStorage.getItem('mafiaRoom');
  const myName = localStorage.getItem('mafiaName') || 'Игрок';
  const isHost = localStorage.getItem('mafiaHost') === 'true';

  let myKey = null;

  document.getElementById('roomCode').textContent = room;

  // Регистрация игрока в комнате
  const playerRef = ref(db, `rooms/${room}/players/${Date.now()}_${Math.floor(Math.random()*1000)}`);
  myKey = playerRef.key;

  set(playerRef, {
    name: myName,
    ready: true,
    host: isHost
  });

  // Автоматически удалять при закрытии вкладки
  window.addEventListener('beforeunload', () => {
    remove(playerRef);
  });

  // Отслеживание игроков онлайн
  const roomRef = ref(db, `rooms/${room}`);
  onValue(roomRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    if (data.status === 'started') {
      window.location.href = 'main.html';
      return;
    }

    const playersGrid = document.getElementById('playersGrid');
    playersGrid.innerHTML = '';

    const playersList = data.players ? Object.values(data.players) : [];

    playersList.forEach((p, idx) => {
      const d = document.createElement('div');
      d.className = 'slot ready';
      d.innerHTML = `
        <div style="font-size:1.2rem">👤</div>
        <div class="slot-name">${p.name} ${p.host ? '👑' : ''}</div>
      `;
      playersGrid.appendChild(d);
    });

    const startBtn = document.getElementById('startBtn');
    if (isHost) {
      startBtn.style.display = 'inline-block';
      startBtn.disabled = playersList.length < 2; // Можно начать, если есть минимум 2 игрока
    } else {
      startBtn.style.display = 'none';
    }
  });

  window.startGame = function() {
    set(ref(db, `rooms/${room}/status`), 'started');
  };

  window.leaveGame = function() {
    remove(playerRef).then(() => {
      window.location.href = 'index.html';
    });
  };
</script>
</head>
<body>
<div class="header">
<a href="index.html" class="logo">🎭 МАФИЯ</a>
<div class="code-box">
<span>КОД:</span>
<span id="roomCode">------</span>
</div>
</div>

<div class="main">
<h3 style="color:#ffd700;text-align:center;margin-bottom:12px">👥 Игроки в комнате</h3>
<div class="players" id="playersGrid"></div>

<div class="actions">
<button class="btn" onclick="leaveGame()">🚪 Выйти</button>
<button class="btn btn-prim" id="startBtn" onclick="startGame()" disabled>🚀 Начать игру</button>
</div>
</div>
</body>
</html>
