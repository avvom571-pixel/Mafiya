<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мафия — Суд</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0a0a1a,#1a1a2e,#0f1623);min-height:100vh;color:#e0e0e0}
.header{background:rgba(0,0,0,.5);padding:12px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid rgba(255,215,0,.3)}
.logo{color:#ffd700;font-size:1.1rem;font-weight:bold;text-decoration:none}
.info{display:flex;gap:12px;align-items:center}
.pill{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);padding:5px 12px;border-radius:20px;font-size:.8rem;color:#ffd700}
.timer{color:#ff6b6b;font-family:monospace;font-size:1.3rem;min-width:45px;text-align:center}

.main{max-width:700px;margin:0 auto;padding:20px 16px}
h1{color:#ffd700;text-align:center;font-size:1.5rem;margin-bottom:4px}
p.sub{color:#888;text-align:center;margin-bottom:20px;font-size:.85rem}

.target-box{background:rgba(255,255,255,.04);border:2px solid rgba(255,215,0,.3);border-radius:12px;padding:20px;text-align:center;margin-bottom:20px}
.target-box .num{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#ffd700,#ff8c00);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:bold;margin:0 auto 10px;color:#0f0f1a}
.target-box .name{color:#ffd700;font-size:1.2rem;font-weight:bold;margin-bottom:4px}
.target-box .hint{color:#888;font-size:.85rem}

.results{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:16px;margin-bottom:16px}
.meter{display:flex;justify-content:center;align-items:center;gap:16px;margin:14px 0}
.meter-side{text-align:center}
.meter-label{font-size:.7rem;color:#888}
.meter-num{font-size:1.4rem;font-weight:bold}
.meter-num.g{color:#ff6b6b}
.meter-num.i{color:#4ecdc4}
.meter-bar{width:140px;height:5px;background:rgba(255,255,255,.1);border-radius:3px;position:relative;overflow:hidden}
.meter-fill{position:absolute;top:0;height:100%;transition:width .4s}
.meter-fill.g{right:50%;background:#ff6b6b}
.meter-fill.i{left:50%;background:#4ecdc4}

.last{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:14px;margin-bottom:14px}
.last h4{color:#ffd700;text-align:center;margin-bottom:6px;font-size:.95rem}
.last p{color:#b0b0c0;text-align:center;font-style:italic;font-size:.85rem}

.actions{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.abtn{padding:10px 24px;font-size:.85rem;border:2px solid;background:transparent;cursor:pointer;border-radius:6px;transition:.2s}
.abtn.g{border-color:#ff6b6b;color:#ff6b6b}
.abtn.g:hover,.abtn.g.active{background:#ff6b6b;color:#fff}
.abtn.i{border-color:#4ecdc4;color:#4ecdc4}
.abtn.i:hover,.abtn.i.active{background:#4ecdc4;color:#0f0f1a}
.abtn:disabled{opacity:.4;cursor:not-allowed}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:none;justify-content:center;align-items:center;z-index:2000}
.modal.on{display:flex}
.modal-box{background:linear-gradient(135deg,#1a1a2e,#16213e);border:2px solid rgba(255,215,0,.3);border-radius:14px;padding:24px;text-align:center;max-width:360px;width:90%}
.modal-box .icon{font-size:2.5rem;margin-bottom:8px}
.modal-box h2{color:#ffd700;font-size:1.2rem;margin-bottom:8px}
.modal-box p{color:#b0b0c0;margin-bottom:14px;font-size:.85rem}
.modal-box button{padding:10px 24px;background:#ffd700;color:#0f0f1a;border:none;border-radius:6px;cursor:pointer;font-weight:bold;font-size:.85rem}

.back-btn{display:block;width:100%;max-width:200px;margin:20px auto 0;padding:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);color:#b0b0c0;border-radius:8px;cursor:pointer;text-align:center;text-decoration:none;font-size:.9rem}
</style>

<!-- Firebase Подключение -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBTD1Y1Bx-dnpGW8vhPEooCQYfwwl1J7gc",
    authDomain: "mafiya-f67b8.firebaseapp.com",
    databaseURL: "https://mafiya-f67b8-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "mafiya-f67b8",
    storageBucket: "mafiya-f67b8.firebasestorage.app",
    messagingSenderId: "558213204051",
    appId: "1:558213204051:web:b54966b94d8be66c16dea6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const room = localStorage.getItem('mafiaRoom');
  const myName = localStorage.getItem('mafiaName') || 'Игрок';
  let voted = false;
  let targetData = null;

  if (!room) {
    alert('Комната не найдена!');
    window.location.href = 'start.html';
  }

  // Подписка на данные суда в реальном времени
  const courtRef = ref(db, `rooms/${room}/court`);
  onValue(courtRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    targetData = data.target;

    // Отображаем подсудимого
    if (targetData) {
      document.getElementById('targetNum').textContent = targetData.role === 'мафия' ? '🎭' : '👤';
      document.getElementById('targetName').textContent = targetData.name;
    }

    // Обновляем счетчик голосов
    const votes = data.votes || {};
    let guiltyCount = 0;
    let innocentCount = 0;

    Object.values(votes).forEach(v => {
      if (v === 'guilty') guiltyCount++;
      if (v === 'innocent') innocentCount++;
    });

    document.getElementById('gNum').textContent = guiltyCount;
    document.getElementById('iNum').textContent = innocentCount;

    const total = guiltyCount + innocentCount || 1;
    document.getElementById('gBar').style.width = (guiltyCount / total * 100) + '%';
    document.getElementById('iBar').style.width = (innocentCount / total * 100) + '%';

    // Проверка статуса завершения суда
    if (data.status === 'finished') {
      const isGuilty = guiltyCount > innocentCount;
      const roleText = targetData ? ` (Он был: ${targetData.role.toUpperCase()})` : '';
      
      showModal(
        isGuilty ? '🔴' : '🟢',
        isGuilty ? 'ВИНОВЕН!' : 'НЕВИНОВЕН!',
        isGuilty 
          ? `Игрок ${targetData.name} был исключен из игры!${roleText}` 
          : `Игрок ${targetData.name} оправдан и остается в игре!`
      );
    }
  });

  // Таймер обратного отсчета
  let time = 30;
  const timerInt = setInterval(() => {
    time--;
    document.getElementById('timer').textContent = time;
    if (time <= 0) {
      clearInterval(timerInt);
      // Если время вышло, отсылаем статус завершения (делает хост)
      if (localStorage.getItem('mafiaHost') === 'true') {
        update(ref(db, `rooms/${room}/court`), { status: 'finished' });
      }
    }
  }, 1000);

  // Отправка голоса
  window.sendVote = function(type) {
    if (voted) return;
    voted = true;

    // Отключаем кнопки
    document.querySelectorAll('.abtn').forEach(b => b.disabled = true);
    
    // Записываем голос в Firebase
    set(ref(db, `rooms/${room}/court/votes/${myName}`), type);
  };

  window.toGame = function() {
    window.location.href = 'main.html';
  };
</script>
</head>
<body>
<div class="header">
<a href="start.html" class="logo">🎭 МАФИЯ</a>
<div class="info">
<div class="pill">Суд</div>
<div class="timer" id="timer">30</div>
</div>
</div>

<div class="main">
<h1>⚖️ Суд над игроком</h1>
<p class="sub">Решите судьбу обвиняемого</p>

<div class="target-box">
<div class="num" id="targetNum">?</div>
<div class="name" id="targetName">Ожидание обвиняемого...</div>
<div class="hint">Этот игрок был выставлен на голосование</div>
</div>

<div class="results">
<div class="meter">
<div class="meter-side"><div class="meter-label">ВИНОВЕН</div><div class="meter-num g" id="gNum">0</div></div>
<div class="meter-bar"><div class="meter-fill g" id="gBar" style="width:0%"></div><div class="meter-fill i" id="iBar" style="width:0%"></div></div>
<div class="meter-side"><div class="meter-label">НЕВИНОВЕН</div><div class="meter-num i" id="iNum">0</div></div>
</div>

<div class="last">
<h4>🎤 Последнее слово</h4>
<p id="lastWord">"Клянусь, я мирный житель! Не верьте мафии!"</p>
</div>

<div class="actions">
<button class="abtn g" onclick="sendVote('guilty')">🔴 ВИНОВЕН</button>
<button class="abtn i" onclick="sendVote('innocent')">🟢 НЕВИНОВЕН</button>
</div>
</div>

<a href="main.html" class="back-btn">⬅️ Вернуться к игре</a>
</div>

<div class="modal" id="modal">
<div class="modal-box">
<div class="icon" id="mIcon">⚖️</div>
<h2 id="mTitle">Результат</h2>
<p id="mText">...</p>
<button onclick="toGame()">Вернуться в игру</button>
</div>
</div>

<script>
function showModal(icon, title, txt) {
  document.getElementById('mIcon').textContent = icon;
  document.getElementById('mTitle').textContent = title;
  document.getElementById('mText').textContent = txt;
  document.getElementById('modal').classList.add('on');
}
</script>
</body>
</html>
