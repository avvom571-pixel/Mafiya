<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мафия — Вход</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0a0a1a,#1a1a2e,#0f1623);min-height:100vh;display:flex;justify-content:center;align-items:center;color:#e0e0e0}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:32px;max-width:400px;width:90%;text-align:center}
.icon{font-size:4rem;margin-bottom:8px}
h1{color:#ffd700;font-size:2.2rem;letter-spacing:4px;margin-bottom:4px}
.sub{color:#888;font-size:.9rem;margin-bottom:24px}

.block{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:18px;margin-bottom:14px}
.block h3{color:#ffd700;font-size:1rem;margin-bottom:10px}
.row{display:flex;gap:8px}
input{flex:1;padding:12px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#ffd700;border-radius:8px;font-size:1rem;text-align:center;letter-spacing:2px}
input::placeholder{color:#555;letter-spacing:0;font-size:.85rem}
.btn{padding:12px 20px;background:#ffd700;color:#0f0f1a;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-size:.9rem;transition:.2s;white-space:nowrap}
.btn:hover{background:#ffaa00}

.or{color:#555;margin:12px 0;font-size:.8rem}
.create-btn{display:block;width:100%;padding:14px;background:linear-gradient(45deg,#ffd700,#ff8c00);color:#0f0f1a;border:none;border-radius:10px;cursor:pointer;font-weight:bold;font-size:1rem;transition:.2s}
.create-btn:hover{opacity:.9}
</style>

<!-- Подключение Firebase через CDN -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBTD1Y1Bx-dnpGW8vhPEooCQYfwwl1J7gc",
    authDomain: "mafiya-f67b8.firebaseapp.com",
    databaseURL: "https://mafiya-f67b8-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "mafiya-f67b8",
    storageBucket: "mafiya-f67b8.firebasestorage.app",
    messagingSenderId: "558213204051",
    appId: "1:558213204051:web:b54966b94d8be66c16dea6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.joinGame = async function() {
    const name = document.getElementById('nameIn').value.trim();
    const code = document.getElementById('codeIn').value.trim().toUpperCase();

    if (!name) return alert('Введите ваше имя!');
    if (!code) return alert('Введите код комнаты!');

    const dbRef = ref(db);
    const snapshot = await get(child(dbRef, `rooms/${code}`));

    if (snapshot.exists()) {
      localStorage.setItem('mafiaName', name);
      localStorage.setItem('mafiaRoom', code);
      localStorage.setItem('mafiaHost', 'false');
      window.location.href = 'coming.html';
    } else {
      alert('Комната с таким кодом не найдена!');
    }
  };

  window.createGame = function() {
    const name = document.getElementById('nameIn').value.trim();
    if (!name) return alert('Введите ваше имя!');

    const code = Math.random().toString(36).substring(2, 7).toUpperCase();

    set(ref(db, 'rooms/' + code), {
      status: 'waiting',
      created: Date.now()
    }).then(() => {
      localStorage.setItem('mafiaName', name);
      localStorage.setItem('mafiaRoom', code);
      localStorage.setItem('mafiaHost', 'true');
      window.location.href = 'coming.html';
    });
  };
</script>
</head>
<body>
<div class="card">
<div class="icon">🎭</div>
<h1>МАФИЯ</h1>
<p class="sub">Онлайн с друзьями</p>

<div class="block">
<h3>Ваш никнейм</h3>
<input type="text" id="nameIn" placeholder="Введите имя" maxlength="12">
</div>

<div class="block">
<h3>🔑 Войти в комнату</h3>
<div class="row">
<input type="text" id="codeIn" placeholder="Код" maxlength="6">
<button class="btn" onclick="joinGame()">ВОЙТИ</button>
</div>
</div>

<div class="or">— или —</div>

<button class="create-btn" onclick="createGame()">➕ Создать новую комнату</button>
</div>
</body>
</html>
